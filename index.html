<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>生意宝 AI V1.1 - 小商家自动获客成交系统</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: #0f172a;
      color: #101828;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 14px;
    }

    .hero {
      color: #fff;
      padding: 26px 8px 18px;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .hero .sub-title {
      margin-top: 8px;
      font-size: 15px;
      color: #cbd5e1;
    }

    .hero .tag {
      display: inline-block;
      margin-top: 12px;
      padding: 7px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 13px;
      color: #e2e8f0;
    }

    .hero p {
      margin: 16px auto 0;
      max-width: 720px;
      line-height: 1.7;
      color: #e2e8f0;
      font-size: 16px;
    }

    .hero strong {
      color: #facc15;
    }

    .industry-tags {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .industry-tags span {
      background: rgba(255,255,255,0.1);
      color: #e2e8f0;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
    }

    .top-cta {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-cta button {
      min-width: 150px;
    }

    .card {
      background: #fff;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.28);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 900;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .small-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      color: #1570ef;
      background: #eff8ff;
      border-radius: 999px;
      padding: 5px 9px;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 28px;
      }
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #344054;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
      color: #101828;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #1570ef;
      box-shadow: 0 0 0 3px rgba(21,112,239,0.12);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.15s;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #1570ef;
      color: #fff;
      flex: 1;
    }

    .btn-green {
      background: #12b76a;
      color: #fff;
      flex: 1;
    }

    .btn-orange {
      background: #f79009;
      color: #fff;
      flex: 1;
    }

    .btn-dark {
      background: #0f172a;
      color: #fff;
      flex: 1;
    }

    .btn-light {
      background: #f2f4f7;
      color: #344054;
    }

    .quick-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: #f2f4f7;
      color: #344054;
      font-size: 13px;
      cursor: pointer;
      font-weight: 700;
    }

    .chip:hover {
      background: #e4e7ec;
    }

    .notice {
      font-size: 13px;
      color: #667085;
      line-height: 1.7;
      margin-top: 10px;
    }

    .usage-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
      color: #475467;
      margin-bottom: 14px;
    }

    .usage-box strong {
      color: #d92d20;
    }

    .result-empty {
      background: #f9fafb;
      border: 1px dashed #d0d5dd;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      color: #667085;
      line-height: 1.7;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .result-card {
      border: 1px solid #e4e7ec;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }

    .result-head {
      padding: 13px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e4e7ec;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .result-head h3 {
      margin: 0;
      font-size: 16px;
      color: #101828;
    }

    .copy-small {
      padding: 8px 10px;
      border-radius: 10px;
      background: #1570ef;
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .result-body {
      padding: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #101828;
      font-size: 15px;
    }

    .pay-banner {
      margin-top: 14px;
      background: linear-gradient(135deg, #fff7ed, #fffbeb);
      border: 1px solid #fedf89;
      border-radius: 18px;
      padding: 15px;
      line-height: 1.8;
    }

    .pay-banner strong {
      color: #d92d20;
    }

    .price {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    @media (max-width: 720px) {
      .price {
        grid-template-columns: 1fr;
      }
    }

    .price-card {
      border: 1px solid #eaecf0;
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .price-card h3 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .price-card strong {
      font-size: 24px;
      color: #d92d20;
    }

    .price-card p {
      margin: 8px 0 0;
      color: #667085;
      line-height: 1.7;
      font-size: 14px;
    }

    .qr-box {
      margin-top: 14px;
      border: 1px dashed #d0d5dd;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      background: #f9fafb;
    }

    .qr-placeholder {
      width: 180px;
      height: 180px;
      margin: 0 auto 10px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #e4e7ec;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #98a2b3;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    .qr-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .contact-box {
      margin-top: 12px;
      padding: 14px;
      background: #f8fafc;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      line-height: 1.8;
      font-size: 14px;
    }

    .footer {
      color: #cbd5e1;
      text-align: center;
      font-size: 13px;
      padding: 20px 0 32px;
      line-height: 1.7;
    }

    .modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.72);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .modal h2 {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 22px;
    }

    .modal p {
      color: #475467;
      line-height: 1.8;
      margin: 0 0 12px;
    }

    .modal .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

      flex:
